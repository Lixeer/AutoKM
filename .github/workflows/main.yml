name: Build AutoKM Firmware

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: esp32
            project: src
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive
          
      - name: Remove old sdkconfig
        run: rm -f ${{ matrix.project }}/sdkconfig
          
      - name: Build with ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5.3
          target: ${{ matrix.target }}
          path: ${{ matrix.project }}
          
      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AutoKM-firmware-${{ matrix.target }}
          path: |
            ${{ matrix.project }}/build/*.bin
          if-no-files-found: warn
          retention-days: 7
